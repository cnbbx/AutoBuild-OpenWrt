name: build-openWrt
run-name: 我的OpenWrt云编译：${{ inputs.TITLE_SHOW }}
env:
  REPO_URL: https://github.com/cnbbx/Openwrt-src.git
  REPO_BRANCH: openwrt-23.05
  BUILD_USER: ${{ github.actor }}
  TZ: Asia/Shanghai

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: "开启tmate远程调试"
        required: false
        default: false
      UPLOAD_BIN_DIR:
        description: "保存编译后的全部文件"
        type: boolean
        default: true
      UPLOAD_RELEASE:
        description: "发布固件到Releases"
        type: boolean
        default: true
      YOUKU_BUILD:
        description: "开启youku_yk-l2编译"
        type: boolean
        default: true
      NEWIFI_BUILD:
        description: "开启d-team_newifi-d2编译"
        type: boolean
        default: true
      X86_BUILD:
        description: "开启x86_64编译"
        type: boolean
        default: true
      TITLE_SHOW:
        type: string
        description: 任务流程标题

  #schedule:
  #  - cron: '5 22 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - FIRMWARE_NAME: youku_yk-l2
            FIRMWARE_BUILD: ${{ inputs.YOUKU_BUILD }}
          - FIRMWARE_NAME: d-team_newifi-d2
            FIRMWARE_BUILD: ${{ inputs.NEWIFI_BUILD }}
          - FIRMWARE_NAME: x86_64
            FIRMWARE_BUILD: ${{ inputs.X86_BUILD }}
    steps:
      - name: checkout
        uses: actions/checkout@main

      - name: 检查空间使用情况
        run: |
          echo "警告⚠"
          echo -e "-------------- ------------CPU信息------------------------------------------\n"
          echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
          echo -e "CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
          echo "-------------------------------内存信息-------------------------------------------"
          echo "已安装内存详细信息："
          sudo lshw -short -C memory | grep GiB
          echo -e "\n"
          echo "-----------------------------硬盘信息---------------------------------------------"
          echo -e  "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
          echo "硬盘详情："
          df -Th

      - name: 彻底修复系统环境
        if: matrix.FIRMWARE_BUILD == true
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "=== 1. 清理旧目录 ==="
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          
          echo "=== 2. 修复 apt 源配置 ==="
          # 备份现有配置
          sudo mv /etc/apt/sources.list /etc/apt/sources.list.bak
          
          # 写入新的官方源（针对 Ubuntu 22.04 Jammy）
          cat <<EOF | sudo tee /etc/apt/sources.list
          deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse
          deb http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
          EOF
          
          echo "=== 3. 启用 i386 多架构支持 ==="
          sudo dpkg --add-architecture i386
          
          echo "=== 4. 彻底重置 APT 状态 ==="
          # 清空缓存
          sudo rm -rf /var/lib/apt/lists/*
          
          # 修复损坏的包状态
          sudo dpkg --configure -a
          sudo apt-get -f install -y
          
          # 移除所有包锁定
          if [ -n "$(apt-mark showhold)" ]; then
            echo "解除被锁定的包:"
            apt-mark showhold
            apt-mark unhold $(apt-mark showhold)
          fi
          
          echo "=== 5. 强制更新 apt 缓存 ==="
          sudo apt-get update -y
          
          echo "=== 6. 分步安装核心包 ==="
          # 第一步：安装最基础的工具
          sudo apt-get install -y --fix-broken --fix-missing
          
          # 第二步：安装编译基础包
          sudo apt-get install -y \
              build-essential \
              gcc \
              g++ \
              make \
              cmake \
              pkg-config
          
          # 第三步：安装 OpenWrt 必需包
          sudo apt-get install -y \
              git \
              wget \
              curl \
              rsync \
              unzip \
              bzip2 \
              p7zip-full \
              python3 \
              python3-distutils \
              python3-dev
          
          # 第四步：安装库依赖
          sudo apt-get install -y \
              libssl-dev \
              libncurses5-dev \
              libz-dev \
              libelf-dev \
              libfuse-dev \
              texinfo \
              flex \
              bison \
              gawk \
              gettext \
              autoconf \
              automake \
              libtool \
              swig
          
          # 第五步：安装多架构支持
          sudo apt-get install -y \
              lib32gcc-s1 \
              libc6-dev-i386 \
              libstdc++6:i386
          
          # 第六步：安装额外工具
          sudo apt-get install -y \
              asciidoc \
              binutils \
              patch \
              zlib1g-dev
          
          echo "=== 7. 安装 dtc (设备树编译器) ==="
          sudo apt-get install -y device-tree-compiler
          
          echo "=== 8. 安装 Node.js + uglify-js ==="
          # 使用 nodesource 官方源
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g uglify-js
          
          echo "=== 9. 验证安装 ==="
          echo "GCC 版本:"
          gcc --version
          echo "Git 版本:"
          git --version
          echo "Python 版本:"
          python3 --version
          echo "Node.js 版本:"
          node --version
          
          echo "=== 10. 清理 ==="
          sudo apt-get autoremove -y
          sudo apt-get clean
          
          echo "=== 11. 设置时区 ==="
          sudo timedatectl set-timezone "Asia/Shanghai"
          
          echo "=== 12. 创建工作目录 ==="
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          
          echo "✅ 系统环境准备完成！"

      
      - name: 克隆软路由源代码
        if: matrix.FIRMWARE_BUILD == true
        working-directory: /workdir
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          
      - name: 修改版本补丁
        if: matrix.FIRMWARE_BUILD == true
        run: |
          tree
          [ -e feeds.conf.default ] && mv feeds.conf.default openwrt/feeds.conf.default
          [ -e my-changes.patch ] && mv my-changes.patch openwrt/my-changes.patch
          cd openwrt && [ -e my-changes.patch ] && git apply my-changes.patch

      - name: 更新和安装自定义项目的清单
        if: matrix.FIRMWARE_BUILD == true
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 加载自定义固件配置
        if: matrix.FIRMWARE_BUILD == true && !cancelled()
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e ${{ matrix.FIRMWARE_NAME }}.config ] && mv ${{ matrix.FIRMWARE_NAME }}.config openwrt/.config
          [ -e ${{ matrix.FIRMWARE_NAME }}.sh ] && mv ${{ matrix.FIRMWARE_NAME }}.sh openwrt/diy.sh
          cd openwrt/ && chmod +x diy.sh && ./diy.sh
          
      - name: 启动tmate远程调试
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        
      - name: 下载自定义固件插件
        if: matrix.FIRMWARE_BUILD == true && !cancelled()
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 编译固件
        if: matrix.FIRMWARE_BUILD == true && !cancelled()
        id: compile
        run: |
          cd openwrt && mkdir -p firmware
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s
          cd bin/targets/*/*
          mv *.buildinfo *.manifest *.bin $GITHUB_WORKSPACE/openwrt/firmware || true
          mv  *.vmdk $GITHUB_WORKSPACE/openwrt/firmware || true
          mv  *.vhdx $GITHUB_WORKSPACE/openwrt/firmware || true

      - name: 保存编译后的固件文件
        if: matrix.FIRMWARE_BUILD == true && inputs.UPLOAD_BIN_DIR == true  && !cancelled()
        uses: actions/upload-artifact@main
        with:
          name: OpenWrt_Firmware
          path: openwrt/firmware

      - name: 保存编译后的插件文件
        if: matrix.FIRMWARE_BUILD == true  && inputs.UPLOAD_BIN_DIR == true&& !cancelled()
        uses: actions/upload-artifact@main
        with:
          name: OpenWrt_Packages
          path: openwrt/bin

  deploy:
    needs: build
    runs-on: ubuntu-20.04
    steps:
      - name: 调取编译后的固件文件
        uses: actions/download-artifact@main
        with:
          name: OpenWrt_Firmware
          path: openwrt/firmware

      - name: 调取编译后的插件文件
        uses: actions/download-artifact@main
        with:
          name: OpenWrt_Packages
          path: openwrt/bin

      - name: 优化需要发布的固件
        id: organize
        if: (!cancelled())
        run: |
          cd openwrt
          tar -zcvf firmware/Packages.tar.gz ./bin/

      - name: 生成 release tag
        id: tag
        if: (inputs.UPLOAD_RELEASE == true) && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          cat >> release.txt <<EOF
          1、本固件为自动编译
          2、发行版中只提供完整的固件
          3、源码：${{ env.REPO_URL }}
          -- Build by ${{ env.BUILD_USER }} @ with Github Action on $(date +"%Y.%m.%d-%H%M")
          🚀 Auto build | 自动编译
          EOF

      - name: 上传固件到release
        uses: softprops/action-gh-release@v1
        if: (inputs.UPLOAD_RELEASE == true) && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: openwrt/firmware/*

      - name: 移除老的 workflow runs
        uses: zhoujinshi/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3

      - name: 移除老的 Releases
        uses: dev-drprasad/delete-older-releases@master
        if: (inputs.UPLOAD_RELEASE == true || inputs.UPLOAD_RELEASE == '') && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
