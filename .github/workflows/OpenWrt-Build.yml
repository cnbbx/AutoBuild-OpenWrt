name: OpenWrt Build (Fixed)

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: '清理构建'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_device:
        description: '目标设备'
        required: true
        default: 'd-team_newifi-d2'
        type: string
      build_type:
        description: '构建类型'
        required: true
        default: 'defconfig'
        type: choice
        options:
          - 'defconfig'

env:
  OPENWRT_REPO: "https://github.com/cnbbx/Openwrt-src.git"
  OPENWRT_BRANCH: "openwrt-25.12"

jobs:
  setup-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 显示工作流输入
      run: |
        echo "部署时间: $(date)"
        echo "清理构建: ${{ inputs.clean_build }}"
        echo "目标设备: ${{ inputs.target_device }}"
        echo "构建类型: ${{ inputs.build_type }}"

  config-firmware:
    runs-on: ubuntu-latest
    needs: setup-build
    
    steps:
    - name: 检出源码
      uses: actions/checkout@v4

    - name: 克隆 OpenWrt 源码
      run: |
        if [ "${{ inputs.clean_build }}" = "true" ] || [ ! -d "openwrt" ]; then
          echo "=== 克隆 OpenWrt 源码 ==="
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} openwrt
        else
          echo "=== 使用现有源码 ==="
        fi

    - name: 更新和安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 🔧 自动配置固件（默认模式）
      if: ${{ inputs.build_type == 'defconfig' }}
      run: |
        cd openwrt
        
        echo "=== 生成默认设备配置 ==="
        
        # 设置目标平台
        cat >> .config <<EOF
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_${{ inputs.target_device }}=y
        EOF

        # 常用包
        cat >> .config <<'EOF'
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-ssl-openssl=y
        CONFIG_LUCI_LANG_zh-cn=y
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-app-wireguard=y
        CONFIG_PACKAGE_luci-app-ddns=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-zerotier=y
        CONFIG_PACKAGE_iptables-mod-extra=y
        CONFIG_PACKAGE_iptables-mod-tproxy=y
        CONFIG_PACKAGE_fdisk=y
        CONFIG_PACKAGE_blkid=y
        CONFIG_PACKAGE_block-mount=y
        EOF

        echo "=== 生成默认配置 ==="
        make defconfig

        echo "=== 查看最终配置摘要 ==="
        grep -E "CONFIG_TARGET|CONFIG_PACKAGE|CONFIG_LUCI" .config | head -30

    - name: 🚨 启动远程调试会话
      if: ${{ inputs.enable_debug == 'true' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        disable-log: false

    - name: 📋 显式保存配置
      run: |
        cd openwrt
        cp .config ../openwrt.config.bak
        echo "✅ 配置已备份到 openwrt.config.bak"

    - name: 📦 上传 OpenWrt 源码
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-source-${{ inputs.target_device }}
        path: openwrt/
        retention-days: 30

  build-firmware:
    runs-on: ubuntu-latest
    needs: config-firmware
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 🔽 从 artifact 恢复 OpenWrt 源码
      uses: actions/download-artifact@v4
      with:
        name: openwrt-source-${{ inputs.target_device }}
        path: openwrt/

    - name: 确认源码存在
      run: |
        if [ ! -d "openwrt" ]; then
          echo "❌ 错误：OpenWrt 源码未成功恢复"
          exit 1
        fi
        echo "✅ 成功恢复 OpenWrt 源码"
        ls -la openwrt/

    - name: 💾 恢复配置文件
      run: |
        if [ -f "../openwrt.config.bak" ]; then
          cp ../openwrt.config.bak openwrt/.config
          echo "✅ 恢复配置文件 .config"
        else
          echo "⚠️ 未找到配置文件，继续使用默认配置"
        fi

    - name: 📦 下载依赖包
      run: |
        cd openwrt
        echo "=== 开始下载依赖包 ==="
        make download -j$(nproc) V=s

        echo "=== 完成下载 ==="
        du -sh dl/

    - name: 🔨 构建固件
      run: |
        cd openwrt
        
        echo "=== 开始构建固件 ==="
        echo "CPU 核心数: $(nproc)"
        echo "开始时间: $(date)"

        if make -j$(nproc) V=s; then
          echo "✅ 并行构建成功"
        else
          echo "⚠️ 并行构建失败，尝试单线程构建"
          make -j1 V=s
        fi

        echo "=== 构建完成 ==="
        echo "结束时间: $(date)"

    - name: 📦 收集构建产物
      if: success()
      run: |
        echo "=== 查找固件文件 ==="
        find openwrt/bin/targets -name "*.bin" -o -name "*.img" -o -name "*.gz" | xargs ls -lh

        mkdir -p release-artifacts/${{ inputs.target_device }}

        cp openwrt/bin/targets/ramips/mt7621/*.bin release-artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        cp openwrt/bin/targets/ramips/mt7621/*.img release-artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        cp openwrt/bin/targets/ramips/mt7621/*.gz release-artifacts/${{ inputs.target_device }}/ 2>/dev/null || true

        # 生成 README
        cat > release-artifacts/${{ inputs.target_device }}/README.md <<EOF
        # OpenWrt 固件构建结果
        - 设备: ${{ inputs.target_device }}
        - 版本: ${{ env.OPENWRT_BRANCH }}
        - 时间: $(date)
        - 用户: ${{ github.actor }}
        - 仓库: ${{ github.repository }}
        EOF

        echo "=== 构建产物 ==="
        tree release-artifacts/

    - name: 🚨 构建后远程调试
      if: ${{ inputs.enable_debug == 'true' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true

    - name: 💾 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware-${{ inputs.target_device }}
        path: release-artifacts/
        retention-days: 30

    - name: 📊 构建统计
      if: always()
      run: |
        echo "=== 构建统计 ==="
        echo "工作流: ${{ github.workflow }} #${{ github.run_number }}"
        echo "触发者: ${{ github.actor }}"
        echo "设备: ${{ inputs.target_device }}"
        echo "构建大小: $(du -sh openwrt/ 2>/dev/null || echo '未找到')"
        if [ -d "release-artifacts/${{ inputs.target_device }}" ]; then
          echo "固件文件:"
          ls -lh release-artifacts/${{ inputs.target_device }}/ | head -5
        fi
