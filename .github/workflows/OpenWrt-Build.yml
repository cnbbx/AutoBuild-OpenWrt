name: OpenWrt Build (with Manual Config & Remote Debug)

on:
  workflow_dispatch:
    inputs:
      enable_debug:
        description: '启用远程调试 (tmate)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      clean_build:
        description: '清理构建'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_device:
        description: '目标设备'
        required: true
        default: 'd-team_newifi-d2'
        type: string
      build_type:
        description: '构建类型'
        required: true
        default: 'defconfig'
        type: choice
        options:
          - 'defconfig'
          - 'interactive'

env:
  OPENWRT_REPO: "https://github.com/cnbbx/Openwrt-src.git"
  OPENWRT_BRANCH: "openwrt-25.12"

jobs:
  setup-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 显示工作流输入
      run: |
        echo "部署时间: $(date)"
        echo "启用调试: ${{ inputs.enable_debug }}"
        echo "清理构建: ${{ inputs.clean_build }}"
        echo "目标设备: ${{ inputs.target_device }}"
        echo "构建类型: ${{ inputs.build_type }}"

  config-firmware:
    runs-on: ubuntu-latest
    needs: setup-build
    
    steps:
    - name: 检出源码
      uses: actions/checkout@v4
    
    - name: 克隆 OpenWrt 源码
      run: |
        if [ "${{ inputs.clean_build }}" = "true" ] || [ ! -d "openwrt" ]; then
          echo "=== 克隆 OpenWrt 源码 ==="
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} openwrt
        else
          echo "=== 使用现有源码 ==="
        fi
    
    - name: 更新和安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    
    # 重要：手动配置步骤
    - name: 🧠 手动配置固件（交互模式）
      if: ${{ inputs.build_type == 'interactive' }}
      run: |
        cd openwrt
        echo "⚠️  正在启动 menuconfig 配置界面..."
        echo "请确保已连接到终端（如果是远程调试）"
        echo ""
        echo "1. 选择 Target System: MediaTek Ralink MIPS"
        echo "2. 选择 Subtarget: MT7621 based boards"
        echo "3. 选择 Target Profile: ${{ inputs.target_device }}"
        echo "4. 按需添加包后保存配置"
        echo ""
        echo "配置完成后按 Ctrl+C 继续构建"
        echo ""
        
        # 设置默认配置后启动 menuconfig
        make defconfig
        # 会等待用户退出才继续
        make menuconfig
        
        echo "✅ menuconfig 配置完成"
        
        # 保存生成的配置
        cp .config ../openwrt.config.bak
        echo "配置已备份到 openwrt.config.bak"
        
    - name: 🔧 自动配置固件（默认模式）
      if: ${{ inputs.build_type == 'defconfig' }}
      run: |
        cd openwrt
        
        echo "=== 生成默认设备配置 ==="
        
        # 设置目标平台
        cat >> .config <<EOF
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_${{ inputs.target_device }}=y
        EOF
        
        # 常用包（可以修改）
        cat >> .config <<'EOF'
        # 基础组件
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-ssl-openssl=y
        CONFIG_LUCI_LANG_zh-cn=y
        
        # 常用插件
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-app-wireguard=y
        CONFIG_PACKAGE_luci-app-ddns=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-zerotier=y
        
        # 网络工具
        CONFIG_PACKAGE_iptables-mod-extra=y
        CONFIG_PACKAGE_iptables-mod-tproxy=y
        
        # 文件系统
        CONFIG_PACKAGE_fdisk=y
        CONFIG_PACKAGE_blkid=y
        CONFIG_PACKAGE_block-mount=y
        EOF
        
        echo "=== 生成默认配置 ==="
        make defconfig
        
        echo "=== 查看最终配置摘要 ==="
        echo ""
        grep -E "CONFIG_TARGET|CONFIG_PACKAGE|CONFIG_LUCI" .config | head -30
        echo ""
    
    - name: 📋 显示配置文件摘要
      run: |
        cd openwrt
        echo "=== 配置文件统计 ==="
        wc -l .config
        echo ""
        echo "=== 启用的主要包 ==="
        grep "^CONFIG_PACKAGE_luci" .config || true
        echo ""
        echo "=== 目标设备配置 ==="
        grep "DEVICE_${{ inputs.target_device }}" .config || true

    - name: 🚨 启动远程调试会话
      if: ${{ inputs.enable_debug == 'true' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        disable-log: false
        
  build-firmware:
    runs-on: ubuntu-latest
    needs: config-firmware
    timeout-minutes: 120
    
    steps:
    - name: 检出源码
      uses: actions/checkout@v4
    
    - name: 恢复 OpenWrt 目录
      run: |
        if [ -d "openwrt" ]; then
          echo "=== 发现已有 OpenWrt 目录 ==="
          ls -la openwrt/
        else
          echo "❌ 错误：没有找到 OpenWrt 目录"
          exit 1
        fi
    
    - name: 🚨 构建前远程调试
      if: ${{ inputs.enable_debug == 'true' && inputs.build_type == 'interactive' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        
    - name: 下载依赖包
      run: |
        cd openwrt
        echo "=== 开始下载依赖包 ==="
        make download -j$(nproc) V=s
        
        echo "=== 下载完成 ==="
        du -sh dl/
    
    - name: 🔨 构建固件
      run: |
        cd openwrt
        
        echo "=== 开始构建固件 ==="
        echo "CPU 核心数: $(nproc)"
        echo "开始时间: $(date)"
        
        # 并行构建，失败时降级到单线程
        if make -j$(nproc) V=s; then
          echo "✅ 并行构建成功"
        else
          echo "⚠️  并行构建失败，尝试单线程构建"
          make -j1 V=s
        fi
        
        echo "=== 构建完成 ==="
        echo "结束时间: $(date)"
    
    - name: 📦 收集构建产物
      if: success()
      run: |
        echo "=== 查找固件文件 ==="
        find openwrt/bin/targets -name "*.bin" -o -name "*.img" -o -name "*.gz" | xargs ls -lh
        
        # 创建发布目录
        mkdir -p release-artifacts/${{ inputs.target_device }}
        
        # 复制所有相关文件
        cp openwrt/bin/targets/ramips/mt7621/*.bin release-artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        cp openwrt/bin/targets/ramips/mt7621/*.img release-artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        cp openwrt/bin/targets/ramips/mt7621/*.gz release-artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        
        # 复制配置文件
        if [ -f "openwrt.config.bak" ]; then
          cp openwrt.config.bak release-artifacts/${{ inputs.target_device }}/config.txt
        fi
        
        # 生成 README
        cat > release-artifacts/${{ inputs.target_device }}/README.md <<EOF
        # OpenWrt 固件构建结果
        - 设备: ${{ inputs.target_device }}
        - 分支: ${{ env.OPENWRT_BRANCH }}
        - 时间: $(date)
        - 用户: ${{ github.actor }}
        - 仓库: ${{ github.repository }}
        EOF
        
        echo "=== 构建产物 ==="
        tree release-artifacts/
    
    - name: 🚨 构建后远程调试
      if: ${{ inputs.enable_debug == 'true' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
        
    - name: 💾 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware-${{ inputs.target_device }}
        path: release-artifacts/
        retention-days: 30
    
    - name: 📊 构建统计
      if: always()
      run: |
        echo "=== 构建统计 ==="
        echo "工作流: ${{ github.workflow }} #${{ github.run_number }}"
        echo "触发者: ${{ github.actor }}"
        echo "设备: ${{ inputs.target_device }}"
        echo "调试模式: ${{ inputs.enable_debug }}"
        echo "构建大小: $(du -sh openwrt/ 2>/dev/null || echo '未找到')"
        
        if [ -d "release-artifacts/${{ inputs.target_device }}" ]; then
          echo "固件文件:"
          ls -lh release-artifacts/${{ inputs.target_device }}/
        fi
