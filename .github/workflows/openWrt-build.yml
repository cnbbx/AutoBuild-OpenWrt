name: Build OpenWrt (Simplified)

on: 
  workflow_dispatch:
    inputs:
      target_device:
        description: '目标设备 (例如: d-team_newifi-d2)'
        required: true
        default: 'd-team_newifi-d2'
        type: string
      build_type:
        description: '构建类型'
        required: true
        default: 'defconfig'
        type: choice
        options:
          - 'defconfig'
          - 'interactive'
      enable_debug:
        description: '启用 SSH 调试'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_cache:
        description: '启用缓存'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  OPENWRT_REPO: "https://github.com/openwrt/openwrt.git"
  OPENWRT_BRANCH: "openwrt-25.12"
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ inputs.target_device }}
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 显示构建信息
      run: |
        echo "=== 构建信息 ==="
        echo "设备: ${{ inputs.target_device }}"
        echo "模式: ${{ inputs.build_type }}"
        echo "调试: ${{ inputs.enable_debug }}"
        echo "缓存: ${{ inputs.enable_cache }}"
        echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
          file wget llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils ccache rename \
          libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev pkg-config
        sudo timedatectl set-timezone "Asia/Shanghai"
        
    - name: 克隆 OpenWrt 源码
      run: |
        echo "=== 克隆 OpenWrt 源码 ==="
        if [[ "${{ inputs.enable_cache }}" == "true" && -d "/tmp/openwrt-cache/openwrt" ]]; then
          echo "使用缓存源码..."
          cp -r /tmp/openwrt-cache/openwrt .
        else
          echo "从 GitHub 克隆源码..."
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} openwrt
          
          # 如果启用了缓存，保存到缓存目录
          if [[ "${{ inputs.enable_cache }}" == "true" ]]; then
            mkdir -p /tmp/openwrt-cache
            cp -r openwrt /tmp/openwrt-cache/
          fi
        fi

    - name: 配置系统路径和磁盘空间
      run: |
        echo "=== 设置磁盘空间 ==="
        # 创建工作目录软链接以节省空间
        sudo mkdir -p -m 777 /mnt/openwrt/build_dir /mnt/openwrt/staging_dir
        [ -d "openwrt/build_dir" ] || ln -sf /mnt/openwrt/build_dir openwrt/build_dir
        [ -d "openwrt/staging_dir" ] || ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir

    - name: 更新 feeds
      run: |
        cd openwrt
        echo "=== 更新 feeds ==="
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 基础配置
      run: |
        cd openwrt
        echo "=== 设置基础配置 ==="
        
        # 基于目标设备生成配置
        case "${{ inputs.target_device }}" in
          "d-team_newifi-d2")
            echo "配置新路由3 (Newifi D2)"
            cat > .config << 'EOF'
            CONFIG_TARGET_ramips=y
            CONFIG_TARGET_ramips_mt7621=y
            CONFIG_TARGET_ramips_mt7621_DEVICE_d-team_newifi-d2=y
            EOF
                        ;;
                      "xiaomi_mi-router-3g")
                        echo "配置小米路由器3G"
                        cat > .config << 'EOF'
            CONFIG_TARGET_ramips=y
            CONFIG_TARGET_ramips_mt7621=y
            CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-3g=y
            EOF
                        ;;
                      "phicomm_k2p")
                        echo "配置斐讯K2P"
                        cat > .config << 'EOF'
            CONFIG_TARGET_ramips=y
            CONFIG_TARGET_ramips_mt7621=y
            CONFIG_TARGET_ramips_mt7621_DEVICE_phicomm_k2p=y
            EOF
                        ;;
                      *)
            echo "使用自定义设备配置"
            # 从仓库中读取设备配置（如果有）
            if [ -f "../devices/${{ inputs.target_device }}/.config" ]; then
              cp "../devices/${{ inputs.target_device }}/.config" .config
            else
              echo "错误：设备 ${{ inputs.target_device }} 未配置"
              exit 1
            fi
            ;;
        esac

        # 添加常用包
        cat >> .config << 'EOF'
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-ssl-openssl=y
        CONFIG_LUCI_LANG_zh-cn=y
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-app-wireguard=y
        CONFIG_PACKAGE_luci-app-ddns=y
        CONFIG_PACKAGE_luci-app-adblock=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-zerotier=y
        CONFIG_PACKAGE_luci-app-samba4=y
        CONFIG_PACKAGE_luci-app-ttyd=y
        CONFIG_PACKAGE_iptables-mod-extra=y
        CONFIG_PACKAGE_iptables-mod-tproxy=y
        CONFIG_PACKAGE_fdisk=y
        CONFIG_PACKAGE_blkid=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-ntfs=y
        CONFIG_PACKAGE_kmod-fs-vfat=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-usb-net=y
        CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y
        CONFIG_PACKAGE_kmod-usb-net-rndis=y
        EOF

    - name: 交互式配置 (menuconfig)
      if: ${{ inputs.build_type == 'interactive' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true

    - name: 执行自定义脚本
      run: |
        cd openwrt
        echo "=== 执行自定义配置脚本 ==="
        
        # 如果有自定义脚本就执行
        if [ -f "../custom.sh" ]; then
          chmod +x ../custom.sh
          ../custom.sh
        fi

    - name: SSH 调试会话
      if: ${{ inputs.enable_debug == 'true' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true

    - name: 生成默认配置
      run: |
        cd openwrt
        echo "=== 生成 defconfig ==="
        make defconfig
        
        # 显示配置摘要
        echo "=== 配置摘要 ==="
        grep -E "CONFIG_TARGET|CONFIG_PACKAGE|CONFIG_LUCI" .config | head -30

    - name: 启用缓存
      if: ${{ inputs.enable_cache == 'true' }}
      run: |
        cd openwrt
        echo "=== 启用 ccache ==="
        echo "CONFIG_CCACHE=y" >> .config
        make defconfig
        export CCACHE_DIR="${{ github.workspace }}/.ccache"
        export PATH="/usr/lib/ccache:$PATH"

    - name: 下载软件包
      run: |
        cd openwrt
        echo "=== 下载软件包 ==="
        
        # 尝试多次下载
        RETRY_COUNT=0
        MAX_RETRIES=3
        until make download -j$(nproc) || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
          RETRY_COUNT=$((RETRY_COUNT + 1))
          echo "下载失败，重试 $RETRY_COUNT/$MAX_RETRIES..."
          sleep 10
        done
        
        if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
          echo "❌ 多次尝试后仍无法下载包"
          exit 1
        fi

    - name: 构建固件
      run: |
        cd openwrt
        echo "=== 开始构建固件 ==="
        echo "CPU 核心数: $(nproc)"
        echo "开始时间: $(TZ='Asia/Shanghai' date '+%H:%M:%S')"
        
        # 获取总内存和可用内存
        TOTAL_MEM=$(free -g | awk '/^Mem:/{print \$2}')
        AVAIL_MEM=$(free -g | awk '/^Mem:/{print \$7}')
        echo "总内存: ${TOTAL_MEM}G, 可用内存: ${AVAIL_MEM}G"
        
        # 根据内存调整并行数
        if [ $AVAIL_MEM -ge 8 ]; then
          JOBS=$(nproc)
        elif [ $AVAIL_MEM -ge 4 ]; then
          JOBS=$(( $(nproc) - 1 ))
        else
          JOBS=2
        fi
        
        echo "使用 ${JOBS} 个并行任务编译"
        
        # 主要编译步骤
        if make -j${JOBS} V=s; then
          echo "✅ 并行编译成功完成"
        else
          echo "⚠️ 并行编译失败，尝试单线程编译"
          make -j1 V=s || {
            echo "❌ 编译失败"
            exit 1
          }
        fi
        
        echo "=== 编译完成 ==="
        echo "结束时间: $(TZ='Asia/Shanghai' date '+%H:%M:%S')"

    - name: 收集构建产物
      if: success()
      run: |
        echo "=== 查找固件文件 ==="
        
        # 查找所有固件文件
        find openwrt/bin/targets -name "*.bin" -o -name "*.img" -o -name "*.gz" | xargs ls -lh 2>/dev/null || true
        
        # 创建发布目录
        mkdir -p artifacts/${{ inputs.target_device }}
        
        # 复制固件文件
        cp openwrt/bin/targets/*/*/*.bin artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        cp openwrt/bin/targets/*/*/*.img artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        cp openwrt/bin/targets/*/*/*.gz artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        cp openwrt/.config artifacts/${{ inputs.target_device }}/ 2>/dev/null || true
        
        # 生成统计信息
        echo "=== 构建统计 ==="
        du -sh openwrt/
        du -sh openwrt/bin/
        
        # 生成 README
        cat > artifacts/${{ inputs.target_device }}/README.md <<EOF
        # OpenWrt 固件
        - 设备: ${{ inputs.target_device }}
        - 分支: ${{ env.OPENWRT_BRANCH }}
        - 构建时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
        - 用户: ${{ github.actor }}
        - 仓库: ${{ github.repository }}
        - 运行ID: ${{ github.run_id }}
        
        ## 文件列表
        $(ls -la artifacts/${{ inputs.target_device }}/ 2>/dev/null | grep -v "total" | awk '{print "- " \$9 " (" \$5 " bytes)"}')
        EOF

    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-${{ inputs.target_device }}-${{ github.run_number }}
        path: artifacts/
        retention-days: 30

    - name: 构建完成通知
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ 构建成功完成"
          echo "固件可在 Artifacts 中下载"
        elif [ "${{ job.status }}" == "failure" ]; then
          echo "❌ 构建失败"
          echo "请检查日志了解详情"
        else
          echo "⚠️ 构建被取消"
        fi

    - name: 清理构建环境
      if: always()
      run: |
        echo "=== 清理环境 ==="
        # 可选：清理临时文件以释放空间
        rm -rf openwrt/tmp
        rm -rf openwrt/logs
        echo "✅ 清理完成"
